<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048: CyberGrid Evolution (Admin Edition)</title>
    <style>
        :root {
            --bg-dark: #050509;
            --grid-line: #1a1a2e;
            --text-main: #e0e0ff;
            --border-glow: #00f2fe;
            --item-color: #fccc2e;
            --admin-glow: #fccc2e;
        }

        * { box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }

        body {
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050509 70%);
            overflow: hidden; color: var(--text-main);
        }

        .admin-btn {
            position: absolute; top: 15px; right: 15px; padding: 5px 10px; font-size: 12px;
            background: rgba(0, 242, 254, 0.1); border: 1px solid var(--border-glow);
            color: var(--border-glow); border-radius: 4px; cursor: pointer; z-index: 1000; transition: all 0.3s;
        }
        .admin-btn:hover { background: var(--border-glow); color: var(--bg-dark); box-shadow: 0 0 10px var(--border-glow); }

        .header { width: 340px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px; }
        h1 { margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--border-glow); color: #fff; }
        
        .score-container { 
            background: rgba(0, 0, 0, 0.5); padding: 5px 15px; border: 1px solid var(--grid-line); 
            border-radius: 4px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        /* 管理员模式下的分数特效 */
        .score-container.admin-active { border-color: var(--admin-glow); box-shadow: 0 0 10px rgba(252, 204, 46, 0.3); }
        #score { font-size: 20px; font-weight: bold; color: var(--border-glow); }
        .score-container.admin-active #score { color: var(--admin-glow); }

        .item-bar {
            display: flex; gap: 10px; width: 340px; justify-content: center;
            height: 0; opacity: 0; margin-bottom: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .item-bar.visible { height: 65px; opacity: 1; margin-bottom: 15px; }

        .item-slot {
            display: none; flex: 1; background: rgba(0, 0, 0, 0.6); border: 1px dashed var(--item-color);
            padding: 5px; border-radius: 4px; text-align: center; cursor: pointer;
            transition: all 0.2s; align-items: center; justify-content: center;
        }
        .item-slot.discovered { display: flex; flex-direction: column; }
        .item-slot.active { border-style: solid; box-shadow: 0 0 15px var(--item-color); background: rgba(252, 204, 46, 0.2); }
        .item-slot img { width: 24px; height: 24px; object-fit: contain; margin-bottom: 2px; }
        .item-name { font-size: 9px; color: var(--item-color); text-transform: uppercase; }
        .item-count { font-size: 12px; font-weight: bold; color: #fff; }

        #game-container {
            position: relative; width: 340px; height: 340px;
            background-color: rgba(26, 26, 46, 0.4); border: 2px solid #1a1a2e;
            border-radius: 8px; padding: 10px; touch-action: none;
        }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 10px; width: 100%; height: 100%; }
        .cell { width: 72.5px; height: 72.5px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--grid-line); border-radius: 4px; }

        .tile {
            position: absolute; width: 72.5px; height: 72.5px; border-radius: 4px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; font-weight: bold; z-index: 10; color: #fff;
            transition: top 0.12s ease-in-out, left 0.12s ease-in-out, transform 0.1s ease-out;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 rgba(0,0,0,0.5);
            will-change: top, left;
        }

        .tile.selectable { cursor: pointer; animation: target-glow 0.8s infinite alternate; z-index: 20; }
        @keyframes target-glow {
            from { box-shadow: 0 0 5px #fff; transform: scale(1); }
            to { box-shadow: 0 0 20px var(--item-color); transform: scale(1.05); }
        }

        .announcement-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 200;
            display: none; align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .announcement-content { text-align: center; transform-origin: top right; }
        .announcement-content img { width: 150px; height: 150px; filter: drop-shadow(0 0 20px var(--item-color)); }
        .announcement-content h2 { color: var(--item-color); margin: 15px 0 5px; font-size: 24px; }

        @keyframes item-pop-in {
            0% { transform: translate(40vw, -40vh) scale(0) rotate(-45deg); opacity: 0; }
            60% { transform: translate(0, 0) scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }
        @keyframes item-fly-to-bar {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: translateY(-300px) scale(0); opacity: 0; }
        }

        .n-2 { background: #444; } .n-4 { background: #009efd; }
        .n-8 { background: #f77062; } .n-16 { background: #b721ff; }
        .n-32 { background: #fa709a; } .n-64 { background: #ff0844; }
        .n-128 { background: #d57eeb; font-size: 24px; }
        .n-256 { background: #96fbc4; color: #333; font-size: 24px; box-shadow: 0 0 20px rgba(150,251,196,0.6); }
        .n-512 { background: #ff00de; font-size: 24px; box-shadow: 0 0 20px rgba(255,0,222,0.6); }
        .n-1024 { background: #00fff2; color: #333; font-size: 20px; }
        .n-2048 { background: #f00; font-size: 20px; animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }

        #over-mask {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 9, 0.9); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100; border-radius: 8px;
        }
        .btn {
            background: transparent; color: var(--border-glow); padding: 8px 20px;
            border: 2px solid var(--border-glow); border-radius: 4px; cursor: pointer;
            text-transform: uppercase; font-family: inherit; margin-top: 10px;
        }
    </style>
</head>
<body>

    <button class="admin-btn" id="admin-trigger" onclick="game.adminMode()">ADMIN</button>

    <div class="header">
        <h1>2048</h1>
        <div class="score-container" id="score-box" onclick="game.adminEditScore()">
            <span id="score">0</span>
        </div>
    </div>

    <div class="item-bar" id="item-bar">
        <div class="item-slot" id="item-hammer" onclick="game.useItem('hammer')">
            <img src="/2048y/img/锤子.jpg" alt="锤子">
            <span class="item-name">锤子</span>
            <span class="item-count" id="count-hammer">0</span>
        </div>
        <div class="item-slot" id="item-swap" onclick="game.useItem('swap')">
            <img src="/2048y/img/换位.png" alt="换位">
            <span class="item-name">换位</span>
            <span class="item-count" id="count-swap">0</span>
        </div>
        <div class="item-slot" id="item-merge" onclick="game.useItem('merge')">
            <img src="/2048y/img/合并.png" alt="合并">
            <span class="item-name">合并</span>
            <span class="item-count" id="count-merge">0</span>
        </div>
    </div>

    <div id="game-container">
        <div class="grid" id="grid-bg"></div>
        <div id="over-mask">
            <h2 style="color:#ff0844">菜就多练！</h2>
			<img src="/2048y/img/菜就多练.jpg" alt="" />
            <button class="btn" onclick="game.init()">不服！再战</button>
        </div>
    </div>

    <div id="item-announcement" class="announcement-layer">
        <div class="announcement-content">
            <img id="announced-img" src="" alt="item">
            <h2 id="announced-name">获得新道具</h2>
            <p style="font-size: 12px; color: #888;">点击屏幕收纳</p>
        </div>
    </div>

    <button class="btn" onclick="game.init()" style="margin-top: 20px;">初始化</button>

    <script>
        const itemAssets = {
            hammer: { name: '量子之锤', img: '/2048y/img/锤子.jpg' },
            swap: { name: '维度换位', img: '/2048y/img/换位.png' },
            merge: { name: '原子合并', img: '/2048y/img/合并.png' }
        };

        const game = {
            size: 4, board: [], score: 0, lastItemScore: 0,
            items: { hammer: 0, swap: 0, merge: 0 },
            discovered: { hammer: false, swap: false, merge: false },
            activeItem: null, selectedIndices: [],
            isAdmin: false, 
            container: document.getElementById('game-container'),
            mask: document.getElementById('over-mask'),
            tileWidth: 72.5, gap: 10,

            init() {
                this.board = Array(16).fill(0);
                this.score = 0; this.lastItemScore = 0;
                this.items = { hammer: 0, swap: 0, merge: 0 };
                this.discovered = { hammer: false, swap: false, merge: false };
                this.activeItem = null; this.selectedIndices = [];
                this.isAdmin = false; 
                this.mask.style.display = 'none';
                document.getElementById('admin-trigger').innerText = 'ADMIN';
                document.getElementById('score-box').classList.remove('admin-active');
                this.renderBg(); this.addTile(); this.addTile();
                this.updateItemUI(); this.draw();
            },

            adminMode() {
                if (this.isAdmin) {
                    this.isAdmin = false;
                    document.getElementById('admin-trigger').innerText = 'ADMIN';
                    document.getElementById('score-box').classList.remove('admin-active');
                    alert("管理者模式已退出。");
                    this.updateItemUI();
                    return;
                }

                const password = prompt("请输入管理者秘钥：");
                if (password === "admin888") {
                    this.isAdmin = true;
                    document.getElementById('admin-trigger').innerText = 'ADMIN (ON)';
                    document.getElementById('score-box').classList.add('admin-active');
                    alert("权限已确认。维度修改器已上线，点击分数可直接改写。");
                    this.updateItemUI();
                } else {
                    alert("权限不足，拒绝访问。");
                }
            },

            // 新增：管理员改分功能
            adminEditScore() {
                if (!this.isAdmin) return;
                const input = prompt("【核心干预】请输入目标分数：", this.score);
                if (input !== null) {
                    const newScore = parseInt(input);
                    if (!isNaN(newScore)) {
                        this.score = newScore;
                        // 同步道具进度，防止瞬间触发大量道具或进度卡死
                        this.lastItemScore = Math.floor(newScore / 1000) * 1000;
                        this.draw();
                    } else {
                        alert("给你外挂都不会用吗");
                    }
                }
            },

            renderBg() {
                const gridBg = document.getElementById('grid-bg');
                gridBg.innerHTML = '';
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    gridBg.appendChild(cell);
                }
            },

            updateItemUI() {
                let anyDiscovered = false;
                for (let type in this.items) {
                    const slot = document.getElementById(`item-${type}`);
                    document.getElementById(`count-${type}`).innerText = this.isAdmin ? '∞' : this.items[type];
                    
                    slot.classList.toggle('active', this.activeItem === type);
                    
                    if (this.discovered[type] || this.isAdmin) {
                        slot.classList.add('discovered');
                        anyDiscovered = true;
                    } else {
                        slot.classList.remove('discovered');
                    }
                }
                document.getElementById('item-bar').classList.toggle('visible', anyDiscovered);
            },

            showItemReward(type) {
                if(this.isAdmin) return; 
                const layer = document.getElementById('item-announcement');
                const content = layer.querySelector('.announcement-content');
                document.getElementById('announced-img').src = itemAssets[type].img;
                document.getElementById('announced-name').innerText = itemAssets[type].name;
                
                layer.style.display = 'flex';
                content.style.animation = 'item-pop-in 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';

                layer.onclick = () => {
                    content.style.animation = 'item-fly-to-bar 0.5s ease-in forwards';
                    setTimeout(() => {
                        layer.style.display = 'none';
                        this.items[type]++;
                        this.discovered[type] = true;
                        this.updateItemUI();
                    }, 500);
                    layer.onclick = null;
                };
            },

            addTile() {
                const empty = this.board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
                if (empty.length > 0) {
                    const idx = empty[Math.floor(Math.random() * empty.length)];
                    this.board[idx] = Math.random() < 0.9 ? 2 : 4;
                    return idx;
                }
            },

            draw() {
                document.querySelectorAll('.tile').forEach(t => t.remove());
                this.board.forEach((val, i) => {
                    if (val !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile n-${val}`;
                        tile.innerText = val;
                        tile.style.top = `${this.gap + Math.floor(i/4) * (this.tileWidth + this.gap)}px`;
                        tile.style.left = `${this.gap + (i%4) * (this.tileWidth + this.gap)}px`;
                        if (this.activeItem) {
                            tile.classList.add('selectable');
                            tile.onclick = (e) => { e.stopPropagation(); this.handleTileClick(i); };
                        }
                        this.container.appendChild(tile);
                    }
                });
                document.getElementById('score').innerText = this.score;
            },

            useItem(type) {
                if (!this.isAdmin && this.items[type] <= 0) return;
                this.activeItem = (this.activeItem === type) ? null : type;
                this.selectedIndices = [];
                this.updateItemUI(); this.draw();
            },

            handleTileClick(idx) {
                if (!this.activeItem || this.board[idx] === 0) return;
                if (this.activeItem === 'hammer') {
                    this.board[idx] = 0; this.finalizeItem();
                } else if (this.activeItem === 'swap' || this.activeItem === 'merge') {
                    this.selectedIndices.push(idx);
                    if (this.selectedIndices.length === 2) {
                        const [i1, i2] = this.selectedIndices;
                        if (this.activeItem === 'swap') {
                            [this.board[i1], this.board[i2]] = [this.board[i2], this.board[i1]];
                            this.finalizeItem();
                        } else if (this.activeItem === 'merge') {
                            if (i1 !== i2 && this.board[i1] === this.board[i2]) {
                                this.board[i2] *= 2; this.board[i1] = 0;
                                this.score += this.board[i2]; this.finalizeItem();
                            } else {
                                this.selectedIndices = []; alert("我就知道有小人！！！数字不同不让合并");
                            }
                        }
                    }
                }
            },

            finalizeItem() {
                if (!this.isAdmin) {
                    this.items[this.activeItem]--;
                }
                this.activeItem = null;
                this.selectedIndices = []; 
                this.updateItemUI(); 
                this.draw();
                if (this.isGameOver()) {
                    this.mask.style.display = 'flex';
                }
            },

            checkItemGain() {
                if (this.score - this.lastItemScore >= 1000) {
                    this.lastItemScore += 1000;
                    const types = ['hammer', 'swap', 'merge'];
                    this.showItemReward(types[Math.floor(Math.random() * 3)]);
                }
            },

            move(dir) {
                if (this.activeItem) return;
                const prev = JSON.stringify(this.board);
                const size = 4;
                let lines = [];
                for (let i = 0; i < size; i++) {
                    if (dir === 'left' || dir === 'right') lines.push(this.board.slice(i * size, i * size + size));
                    else lines.push([this.board[i], this.board[i+4], this.board[i+8], this.board[i+12]]);
                }
                lines = lines.map(line => {
                    if (dir === 'right' || dir === 'down') line.reverse();
                    let nl = line.filter(v => v !== 0);
                    for (let i = 0; i < nl.length - 1; i++) {
                        if (nl[i] === nl[i+1]) { nl[i] *= 2; this.score += nl[i]; nl.splice(i + 1, 1); }
                    }
                    while (nl.length < size) nl.push(0);
                    if (dir === 'right' || dir === 'down') nl.reverse();
                    return nl;
                });
                const nb = Array(16).fill(0);
                lines.forEach((l, i) => l.forEach((v, j) => {
                    if (dir === 'left' || dir === 'right') nb[i * size + j] = v;
                    else nb[j * size + i] = v;
                }));
                if (JSON.stringify(nb) !== prev) {
                    this.board = nb; this.checkItemGain(); this.addTile(); this.draw();
                    if (this.isGameOver()) this.mask.style.display = 'flex';
                }
            },

            isGameOver() {
                if (this.board.includes(0)) return false;
                for (let i = 0; i < 16; i++) {
                    if (i % 4 !== 3 && this.board[i] === this.board[i+1]) return false;
                    if (i < 12 && this.board[i] === this.board[i+4]) return false;
                }
                const hasItems = this.isAdmin || Object.values(this.items).some(count => count > 0);
                if (hasItems) return false;
                return true;
            }
        };

        window.addEventListener('keydown', e => {
            if (e.key.includes('Arrow')) { e.preventDefault(); game.move(e.key.replace('Arrow', '').toLowerCase()); }
        });

        let ts;
        window.addEventListener('touchstart', e => ts = e.touches[0]);
        window.addEventListener('touchend', e => {
            if (!ts) return;
            const dx = e.changedTouches[0].screenX - ts.screenX;
            const dy = e.changedTouches[0].screenY - ts.screenY;
            if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
                if (Math.abs(dx) > Math.abs(dy)) game.move(dx > 0 ? 'right' : 'left');
                else game.move(dy > 0 ? 'down' : 'up');
            }
            ts = null;
        });

        game.init();
    </script>
</body>
</html>
