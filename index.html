<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2048: CyberGrid</title>
    <style>
        :root {
            /* 科技感配色方案 */
            --bg-dark: #050509; /* 深邃背景 */
            --grid-line: #1a1a2e; /* 网格线颜色 */
            --text-main: #e0e0ff; /* 主文字颜色 */
            --border-glow: #00f2fe; /* 基础发光色 (青色) */
            
            /* 数字块霓虹配色序列 */
            --color-2: #fff; /* 白 */
            --color-4: #00f2fe; /* 青 */
            --color-8: #4facfe; /* 蓝 */
            --color-16: #c471ed; /* 紫 */
            --color-32: #f77062; /* 橙红 */
            --color-64: #fe5196; /* 玫红 */
            --color-128: #fccc2e; /* 金黄 */
            --color-256: #5fff7f; /* 荧光绿 */
            --color-512: #ff00de; /* 极光紫 */
            --color-1024: #00fff2; /* 高亮青 */
            --color-2048: #ff0000; /* 警示红 - 终极目标 */
        }

        * {
            box-sizing: border-box;
            user-select: none; /* 防止划动时选中文本 */
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Courier New', Courier, monospace; /* 伪代码字体，增加科技感 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            /* 添加一个模糊的背景微光 */
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #050509 70%);
            overflow: hidden;
        }

        /* 顶部区域 */
        .header {
            width: 340px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            /* 霓虹发光文字 */
            text-shadow: 0 0 5px #fff, 0 0 10px var(--border-glow), 0 0 20px var(--border-glow);
        }

        .score-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 15px;
            border: 1px solid var(--grid-line);
            border-radius: 4px;
            text-align: center;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.2);
        }

        #score {
            font-size: 20px;
            font-weight: bold;
            color: var(--border-glow);
        }

        /* 控制按钮 */
        .controls {
            margin-bottom: 20px;
        }

        .btn {
            background: transparent;
            color: var(--border-glow);
            padding: 10px 25px;
            border: 2px solid var(--border-glow);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            font-family: inherit;
            /* 按钮发光 */
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .btn:hover {
            background: var(--border-glow);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--border-glow);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 游戏主容器 */
        #game-container {
            position: relative;
            width: 340px;
            height: 340px;
            background-color: rgba(26, 26, 46, 0.4);
            border: 2px solid #1a1a2e;
            border-radius: 8px;
            padding: 10px;
            /* 容器外发光 */
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(79, 172, 254, 0.2);
            touch-action: none;
        }

        /* 背景网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 10px;
            width: 100%;
            height: 100%;
        }

        .cell {
            width: 72.5px;
            height: 72.5px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--grid-line);
            border-radius: 4px;
            /* 内凹陷感 */
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5);
        }

        /* 动态数字块 - 立体炫彩的核心 */
        .tile {
            position: absolute;
            width: 72.5px;
            height: 72.5px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            transition: all 0.12s ease-in-out;
            z-index: 10;
            color: #fff;
            
            /* 通用立体效果：
               1. inset shadow 模拟顶部高光
               2. 外shadow 模拟厚度和底部投影
            */
            box-shadow: 
                inset 0 2px 3px rgba(255, 255, 255, 0.3),
                0 4px 0 rgba(0, 0, 0, 0.5),
                0 6px 10px rgba(0, 0, 0, 0.6);
            
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* 伪元素添加表面渐变光泽，增加立体感 */
        .tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            border-radius: 4px 4px 0 0;
        }

        /* 生成数字块的具体样式 (由JS调用) */
        
        /* 2-4: 基础低亮 */
        .n-2 { background: linear-gradient(135deg, #666, #333); color: var(--color-2); border: 1px solid #444;}
        .n-4 { background: linear-gradient(135deg, #2af598 0%, #009efd 100%); color: #fff; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #0076c0, 0 6px 10px rgba(0,0,0,0.5), 0 0 10px rgba(0, 242, 254, 0.5); }

        /* 8-64: 中等炫彩发光 */
        .n-8 { background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); color: #fff; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #d17a7e, 0 6px 10px rgba(0,0,0,0.5), 0 0 15px rgba(247, 112, 98, 0.6); }
        .n-16 { background: linear-gradient(135deg, #b721ff 0%, #21d4fd 100%); box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #7e17b3, 0 6px 10px rgba(0,0,0,0.5), 0 0 15px rgba(183, 33, 255, 0.6); }
        .n-32 { background: linear-gradient(135deg, #fee140 0%, #fa709a 100%); box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #c9597c, 0 6px 10px rgba(0,0,0,0.5), 0 0 15px rgba(250, 112, 154, 0.6); }
        .n-64 { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #c20633, 0 6px 10px rgba(0,0,0,0.5), 0 0 20px rgba(255, 8, 68, 0.7); }

        /* 128+: 高亮终极赛博朋克 */
        .n-128 { background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); font-size: 24px; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #a05eb1, 0 6px 10px rgba(0,0,0,0.5), 0 0 25px rgba(213, 126, 235, 0.8); }
        .n-256 { background: linear-gradient(135deg, #96fbc4 0%, #f9f586 100%); color: #333; font-size: 24px; text-shadow: none; box-shadow: inset 0 2px 3px rgba(255,255,255,0.5), 0 4px 0 #78c99d, 0 6px 10px rgba(0,0,0,0.5), 0 0 25px rgba(150, 251, 196, 0.8); }
        .n-512 { background: linear-gradient(135deg, #ff00de 0%, #7e17b3 100%); font-size: 24px; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #56107a, 0 6px 10px rgba(0,0,0,0.5), 0 0 30px rgba(255, 0, 222, 0.8); }
        .n-1024 { background: linear-gradient(135deg, #00fff2 0%, #0076c0 100%); color: #333; font-size: 20px; text-shadow: none; box-shadow: inset 0 2px 3px rgba(255,255,255,0.5), 0 4px 0 #005a92, 0 6px 10px rgba(0,0,0,0.5), 0 0 35px rgba(0, 255, 242, 0.9); }
        .n-2048 { background: linear-gradient(135deg, #f00 0%, #500 100%); font-size: 20px; animation: pulse 1s infinite alternate; box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #900, 0 6px 10px rgba(0,0,0,0.5), 0 0 40px rgba(255, 0, 0, 1); }

        /* 出现动画 */
        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .tile-new {
            animation: pop 0.2s ease-out;
        }

        /* 2048 终极闪烁动画 */
        @keyframes pulse {
            0% { box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #900, 0 6px 10px rgba(0,0,0,0.5), 0 0 20px rgba(255, 0, 0, 0.8); }
            100% { box-shadow: inset 0 2px 3px rgba(255,255,255,0.3), 0 4px 0 #900, 0 6px 10px rgba(0,0,0,0.5), 0 0 50px rgba(255, 0, 0, 1), 0 0 70px rgba(255, 0, 0, 0.5); }
        }

        /* 游戏结束蒙版 */
        #over-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 9, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 8px;
            backdrop-filter: blur(5px); /* 毛玻璃效果 */
        }
        #over-mask h2 {
            font-size: 40px;
            color: var(--color-2048);
            text-shadow: 0 0 15px var(--color-2048);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>2048</h1>
        <div class="score-container">
            <div style="font-size: 12px; color: #888; text-transform: uppercase;">Score</div>
            <span id="score">0</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="game.init()">重置系统</button>
    </div>

    <div id="game-container">
        <div class="grid" id="grid-bg"></div>
        <div id="over-mask">
            <h2>菜就多练！</h2>
            <button class="btn" onclick="game.init()">重新初始化</button>
        </div>
    </div>

    <p style="font-size: 12px; color: #555; margin-top: 20px;">^ v < > OR SWIPE TO MERGE DATA</p>

    <script>
        // 核心逻辑保持不变，仅修改了绘图细节和增加遮罩控制
        const game = {
            size: 4,
            board: [],
            score: 0,
            container: document.getElementById('game-container'),
            mask: document.getElementById('over-mask'),
            tileWidth: 72.5, // 对应CSS中的尺寸
            gap: 10,

            init() {
                this.board = Array(this.size * this.size).fill(0);
                this.score = 0;
                document.getElementById('score').innerText = 0;
                this.mask.style.display = 'none'; // 隐藏结束蒙版
                this.renderBg();
                this.addTile(true); // 标记为新生成的，用于动画
                this.addTile(true);
                this.draw();
            },

            renderBg() {
                const gridBg = document.getElementById('grid-bg');
                gridBg.innerHTML = '';
                for (let i = 0; i < 16; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    gridBg.appendChild(cell);
                }
            },

            addTile(isNew = false) {
                const emptyCells = this.board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
                if (emptyCells.length > 0) {
                    const randomIdx = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.board[randomIdx] = Math.random() < 0.9 ? 2 : 4;
                    return randomIdx; // 返回新生成的索引
                }
                return null;
            },

            draw(newTileIdx = null) {
                // 清除之前的数字块
                const oldTiles = document.querySelectorAll('.tile');
                oldTiles.forEach(t => t.remove());

                this.board.forEach((val, i) => {
                    if (val !== 0) {
                        const tile = document.createElement('div');
                        const row = Math.floor(i / 4);
                        const col = i % 4;
                        tile.className = `tile n-${val}`;
                        // 如果是新生成的，添加 CSS 动画类
                        if (i === newTileIdx) {
                            tile.classList.add('tile-new');
                        }
                        tile.innerText = val;
                        
                        // 计算坐标：10px间距 + 格子宽
                        tile.style.top = `${this.gap + row * (this.tileWidth + this.gap)}px`;
                        tile.style.left = `${this.gap + col * (this.tileWidth + this.gap)}px`;
                        this.container.appendChild(tile);
                    }
                });
            },

            move(direction) {
                let moved = false;
                const size = this.size;

                const getLines = () => {
                    let lines = [];
                    for (let i = 0; i < size; i++) {
                        if (direction === 'left' || direction === 'right') {
                            lines.push(this.board.slice(i * size, i * size + size));
                        } else {
                            lines.push([this.board[i], this.board[i+size], this.board[i+size*2], this.board[i+size*3]]);
                        }
                    }
                    return lines;
                };

                let lines = getLines();
                let scoreGain = 0;

                lines = lines.map(line => {
                    if (direction === 'right' || direction === 'down') line.reverse();
                    
                    // 1. 挤压
                    let newLine = line.filter(v => v !== 0);
                    
                    // 2. 合并
                    for (let i = 0; i < newLine.length - 1; i++) {
                        if (newLine[i] === newLine[i+1]) {
                            newLine[i] *= 2;
                            scoreGain += newLine[i];
                            newLine.splice(i + 1, 1);
                        }
                    }

                    // 3. 补齐
                    while (newLine.length < size) newLine.push(0);
                    
                    if (direction === 'right' || direction === 'down') newLine.reverse();
                    return newLine;
                });

                // 写回board
                const newBoard = Array(16).fill(0);
                lines.forEach((line, i) => {
                    line.forEach((val, j) => {
                        if (direction === 'left' || direction === 'right') newBoard[i * size + j] = val;
                        else newBoard[j * size + i] = val;
                    });
                });

                // 检查是否发生变化
                if (newBoard.join(',') !== this.board.join(',')) {
                    this.board = newBoard;
                    this.score += scoreGain;
                    const newIdx = this.addTile();
                    this.draw(newIdx); // 传入新块索引以播放动画
                    document.getElementById('score').innerText = this.score;
                    
                    if (this.isGameOver()) {
                        this.mask.style.display = 'flex';
                    }
                }
            },

            isGameOver() {
                if (this.board.includes(0)) return false;
                for (let i = 0; i < 16; i++) {
                    if (i % 4 !== 3 && this.board[i] === this.board[i+1]) return false;
                    if (i < 12 && this.board[i] === this.board[i+4]) return false;
                }
                return true;
            }
        };

        // 事件监听 (Keyboard)
        window.addEventListener('keydown', e => {
            if (game.mask.style.display === 'flex') return; // 游戏结束禁止操作
            if (e.key === 'ArrowLeft') game.move('left');
            if (e.key === 'ArrowRight') game.move('right');
            if (e.key === 'ArrowUp') game.move('up');
            if (e.key === 'ArrowDown') game.move('down');
        });

        // 简易触摸支持
        let touchStart = null;
        window.addEventListener('touchstart', e => touchStart = e.touches[0], {passive: false});
        // 防止iOS浏览器滑动默认行为
        window.addEventListener('touchmove', e => e.preventDefault(), {passive: false}); 

        window.addEventListener('touchend', e => {
            if (!touchStart || game.mask.style.display === 'flex') return;
            const dx = e.changedTouches[0].screenX - touchStart.screenX;
            const dy = e.changedTouches[0].screenY - touchStart.screenY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            // 划动必须超过一定距离才触发 (阈值10px)
            if (Math.max(absDx, absDy) > 10) {
                if (absDx > absDy) {
                    game.move(dx > 0 ? 'right' : 'left');
                } else {
                    game.move(dy > 0 ? 'down' : 'up');
                }
            }
            touchStart = null;
        });

        game.init();
    </script>
</body>
</html>
